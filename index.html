<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opening Mood Beacon...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; background: #f8fafc; }
    .card { text-align: center; padding: 40px; }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; color: #0f172a; margin: 0 0 8px; }
    p { color: #64748b; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🔆</div>
    <h1>Opening Mood Beacon...</h1>
    <p>If the app doesn't open, make sure Mood Beacon is installed.</p>
  </div>
  <script>
    (function () {
      var hash = window.location.hash;
      var search = window.location.search;
      if (hash && hash.includes('access_token=')) {
        window.location.href = 'moodbeacon://auth/callback' + hash;
      } else if (search && search.includes('code=')) {
        window.location.href = 'moodbeacon://auth/callback' + search;
      } else {
        window.location.href = 'https://bipolarbeacon.com';
      }
    })();
  </script>
</body>
</html>
